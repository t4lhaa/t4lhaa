<svg width="350" height="200" viewBox="0 0 350 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideRight { from { stroke-dashoffset: 260; } to { stroke-dashoffset: 0; } }
    .title { font-family: 'Segoe UI', Ubuntu, sans-serif; font-size: 18px; font-weight: 700; fill: #ffffff; letter-spacing: 0.5px; animation: fadeIn 0.8s ease-out forwards; }
    .bar-mask { stroke-dasharray: 260; stroke-dashoffset: 260; animation: slideRight 1.2s cubic-bezier(0.1, 0.5, 0.2, 1) forwards; }
  </style>

  <rect x="5" y="5" rx="10" width="340" height="190" fill="url(#bg-gradient)" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)" />
  
  <text x="30" y="40" class="title">Top Languages</text>
  
  <g transform="translate(30, 65)">
    <mask id="bar-reveal">
      <line x1="0" y1="5" x2="260" y2="5" stroke="white" stroke-width="12" stroke-linecap="round" class="bar-mask" />
    </mask>
    
    <rect x="0" y="0" width="260" height="10" rx="5" fill="#21262d" />
    
    <g mask="url(#bar-reveal)">
      <rect x="0.00" y="0" width="123.81" height="10" fill="#e34c26" filter="url(#glow)" />
<rect x="123.81" y="0" width="77.01" height="10" fill="#ff4ea0" filter="url(#glow)" />
<rect x="200.82" y="0" width="37.66" height="10" fill="#4584b6" filter="url(#glow)" />
<rect x="238.48" y="0" width="17.70" height="10" fill="#7952b3" filter="url(#glow)" />
<rect x="256.18" y="0" width="3.82" height="10" fill="#a8b9cc" filter="url(#glow)" />

    </g>
  </g>

  <g transform="translate(30, 95)">
    
        <g transform="translate(0, 0)">
          <g style="animation: fadeIn 0.5s ease-in-out 450ms forwards; opacity: 0;">
            <circle cx="5" cy="6" r="6" fill="#e34c26" />
            <text x="20" y="10" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12px" font-weight="500" fill="#c9d1d9">HTML</text>
            <text x="20" y="24" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="10px" font-weight="400" fill="#8b949e">47.6%</text>
          </g>
        </g>
        <g transform="translate(0, 28)">
          <g style="animation: fadeIn 0.5s ease-in-out 600ms forwards; opacity: 0;">
            <circle cx="5" cy="6" r="6" fill="#ff4ea0" />
            <text x="20" y="10" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12px" font-weight="500" fill="#c9d1d9">C++</text>
            <text x="20" y="24" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="10px" font-weight="400" fill="#8b949e">29.6%</text>
          </g>
        </g>
        <g transform="translate(0, 56)">
          <g style="animation: fadeIn 0.5s ease-in-out 750ms forwards; opacity: 0;">
            <circle cx="5" cy="6" r="6" fill="#4584b6" />
            <text x="20" y="10" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12px" font-weight="500" fill="#c9d1d9">Python</text>
            <text x="20" y="24" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="10px" font-weight="400" fill="#8b949e">14.5%</text>
          </g>
        </g>
        <g transform="translate(135, 0)">
          <g style="animation: fadeIn 0.5s ease-in-out 900ms forwards; opacity: 0;">
            <circle cx="5" cy="6" r="6" fill="#7952b3" />
            <text x="20" y="10" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12px" font-weight="500" fill="#c9d1d9">CSS</text>
            <text x="20" y="24" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="10px" font-weight="400" fill="#8b949e">6.8%</text>
          </g>
        </g>
        <g transform="translate(135, 28)">
          <g style="animation: fadeIn 0.5s ease-in-out 1050ms forwards; opacity: 0;">
            <circle cx="5" cy="6" r="6" fill="#a8b9cc" />
            <text x="20" y="10" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12px" font-weight="500" fill="#c9d1d9">C</text>
            <text x="20" y="24" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="10px" font-weight="400" fill="#8b949e">1.5%</text>
          </g>
        </g>
  </g>
</svg>